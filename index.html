<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1f74" />
    <meta
      name="description"
      content="Bills n' Bonds — a privacy-first, client-only tracker for US Treasury Bills, Notes, Bonds, TIPS and CDs."
    />
    <title>Bills n' Bonds — Treasury Portfolio Tracker</title>

    <!-- Apply persisted theme BEFORE React mounts to avoid FOUC. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bnb.theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
