name: Deploy to GitHub Pages

# Build and publish on every push to main. workflow_dispatch lets you trigger
# a deploy manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deploy; let in-flight deploys finish so we don't
# tear down a half-published site.
concurrency:
  group: pages
  cancel-in-progress: false

# Job-level permissions are required by actions/deploy-pages@v4 to write to
# the GitHub Pages surface and to sign the deployment via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Build (output → dist/)
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
